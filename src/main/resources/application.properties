# --- S3 File Compressor Configuration (§NFR-3) ---

compressor.bucket=${COMPRESSOR_BUCKET:my-bucket}
compressor.input-prefix=${COMPRESSOR_INPUT_PREFIX:input/}
compressor.output-prefix=${COMPRESSOR_OUTPUT_PREFIX:output/}
compressor.archive-name=${COMPRESSOR_ARCHIVE_NAME:archive}

# --- AWS S3 Client (§NFR-5.1) ---

quarkus.s3.aws.region=${AWS_REGION:us-east-1}
quarkus.s3.aws.credentials.type=default

# --- JSON Structured Logging (§NFR-4) ---

quarkus.log.console.json=true
quarkus.log.level=INFO

# --- Dev Profile: Floci on localhost:4566 (§NFR-5.2) ---
# These are throwaway credentials for Floci emulation only.

%dev.quarkus.s3.endpoint-override=http://localhost:4566
%dev.quarkus.s3.aws.credentials.type=static
%dev.quarkus.s3.aws.credentials.static-provider.access-key-id=test
%dev.quarkus.s3.aws.credentials.static-provider.secret-access-key=test
%dev.quarkus.s3.path-style-access=true
%dev.quarkus.log.console.json=false
%dev.quarkus.log.level=DEBUG

# --- Test Profile: reuse dev config to avoid duplication (DRY) ---

quarkus.test.profile=dev
